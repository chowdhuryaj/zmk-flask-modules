# SPDX-License-Identifier: MIT
description: |
  Flask autoscroll control behavior. Param (dt-bindings/flask/autoscroll.h)
  selects the action — ASC_UP / ASC_DOWN step the signed speed level (through
  zero = stop), ASC_STOP force-stops.

compatible: "zmk,behavior-flask-autoscroll"

properties:
  "#binding-cells":
    type: int
    required: true
    const: 1

binding-cells:
  - param1
