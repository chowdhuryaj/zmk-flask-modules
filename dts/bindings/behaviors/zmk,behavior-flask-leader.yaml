description: |
  "Flask runtime-leader trigger behavior. No params; press opens a capture
  matched against the app-edited sequence table (edited over the Flask
  protocol, channel 0x19)."

compatible: "zmk,behavior-flask-leader"

properties:
  display-name:
    type: string
  "#binding-cells":
    type: int
    required: true
    const: 0

binding-cells: []
