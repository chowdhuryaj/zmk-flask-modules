# flask_rgb — per-key per-layer RGB map (runtime-editable, Flask channel 0x21).
#
# One node per build, shared by both split halves (same keymap/devicetree).
# The half-specific piece — where this half's LEDs sit in the global index
# space — is CONFIG_ZMK_FLASK_RGB_LED_OFFSET (set per-build in build.yaml;
# 0 on the central, the central's led-count on the peripheral).

description: Flask per-key per-layer RGB map

compatible: "flask,rgb"

properties:
  led-strip:
    type: phandle
    required: true
    description: The LED strip device this half renders to.

  led-count:
    type: int
    required: true
    description: Number of LEDs on this half's strip.

  total-leds:
    type: int
    required: true
    description: Total LEDs across the whole keyboard (map width).

  layers:
    type: int
    default: 10
    description: Layers in the color map (match the keymap's layer count).

  key-positions:
    type: array
    description: >
      Keymap position lit by each LED — entry i is the key position LED i
      sits under, total-leds entries. Lets position-addressed consumers
      (the reactive-overlay API, e.g. flask_leader candidate lighting)
      resolve positions to LEDs. Omit for identity (LED i = position i).
      On a split whose per-half chains run in per-half position order
      (the Imprint), this is where the interleaved row numbering gets
      flattened. If the bench paint sweep says the chain order differs,
      fix it HERE (one property), not in the consumers.
