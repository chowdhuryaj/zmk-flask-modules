# SPDX-License-Identifier: MIT
description: |
  Flask PACS-safe scroll converter. Turns relative X/Y motion into wheel
  notches through an integer divisor (remainder carried between events),
  emits notches on a fixed interval with a per-interval cap, and carries
  surplus notches into later intervals. No counts are lost to the cap, fast
  rolls cannot flood slow applications, and a direction reversal first
  cancels pending surplus instead of emitting a burst the wrong way.

  The processor swallows REL_X/REL_Y and re-emits REL_WHEEL/REL_HWHEEL as
  its own input device — attach a second zmk,input-listener to this node to
  route the wheel events onward (e.g. through zip_scroll_snap).

compatible: "zmk,input-processor-flask-scroll"

include: ip_zero_param.yaml

properties:
  divisor:
    type: int
    default: 8
    description: Ball counts per wheel notch (Flask defaults: 8 PC, 120 macOS).

  interval-ms:
    type: int
    default: 16
    description: Dump interval in milliseconds.

  max-notches:
    type: int
    default: 3
    description: Maximum notches emitted per interval, per axis.

  invert-x:
    type: boolean
    description: Invert horizontal wheel output.

  invert-y:
    type: boolean
    description: Invert vertical wheel output.
